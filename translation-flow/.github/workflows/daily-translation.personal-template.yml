name: Daily HF Blog Translation (Personal Repo)

on:
  schedule:
    - cron: "10 0 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Target date in Asia/Seoul, YYYY-MM-DD. Empty means today."
        required: false
        type: string
      post_url:
        description: "Optional single Hugging Face Blog URL."
        required: false
        type: string
      dry_run:
        description: "Run pipeline without push/PR creation."
        required: false
        default: false
        type: boolean
      allow_html_fallback:
        description: "Allow HTML extraction when raw markdown is unavailable."
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: daily-translation-${{ github.repository }}
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-5-nano
      GH_TOKEN: ${{ github.token }}
      TARGET_REPO: ${{ github.repository }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set target date
        id: date
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            echo "value=${{ inputs.date }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(TZ=Asia/Seoul date +%F)" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e "translation-flow[dev]"

      - name: Prepare output folders
        run: mkdir -p output/posts output/manifests output/reports

      - name: Configure git author
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Run translation pipeline
        working-directory: translation-flow
        run: |
          args=(
            --date "${{ steps.date.outputs.value }}"
            --timezone "Asia/Seoul"
            --target-worktree ".."
            --target-repo "${TARGET_REPO}"
            --posts-dir "output/posts"
            --translator "openai"
            --skip-existing
            --allow-untracked
            --run-summary "../output/run-summary.json"
          )
          if [ -n "${{ inputs.post_url }}" ]; then
            args+=(--post-url "${{ inputs.post_url }}")
          fi
          if [ "${{ inputs.allow_html_fallback }}" = "true" ]; then
            args+=(--allow-html-fallback)
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            args+=(--dry-run --no-pr --no-push)
          fi
          python scripts/create_translation_pr.py "${args[@]}"

      - name: Print run summary
        if: always()
        run: |
          if [ -f output/run-summary.json ]; then
            cat output/run-summary.json
          else
            echo "output/run-summary.json not found"
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: translation-output-${{ steps.date.outputs.value }}
          path: output/**