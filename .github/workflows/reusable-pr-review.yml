name: Reusable HF Agent PR Review

on:
  workflow_call:
    inputs:
      target_repo:
        required: true
        type: string
      pr_number:
        required: true
        type: string
      head_sha:
        required: true
        type: string
      file_path:
        required: true
        type: string
      branch:
        required: true
        type: string
      workflow_ref:
        required: true
        type: string
      feedback_revision:
        required: false
        default: ""
        type: string
      max_repair_attempts:
        required: false
        default: 3
        type: number
    secrets:
      DISCORD_WEBHOOK_URL:
        required: false
      KREW_BOT_TOKEN:
        required: true
      OPENAI_API_KEY:
        required: true
  workflow_dispatch:
    inputs:
      target_repo:
        required: true
        type: string
      pr_number:
        required: true
        type: string
      head_sha:
        required: true
        type: string
      file_path:
        required: true
        type: string
      branch:
        required: true
        type: string
      workflow_ref:
        required: true
        default: main
        type: string
      feedback_revision:
        required: false
        default: ""
        type: string
      max_repair_attempts:
        required: false
        default: 3
        type: number

jobs:
  review:
    name: HF Agent / ${{ matrix.skill }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        skill: [seo, quality]
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-5-nano
      SEO_OPENAI_REQUIRED: "1"
    steps:
      - name: Checkout workflow tools
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          repository: Hugging-Face-KREW/hf-workflow
          ref: ${{ inputs.workflow_ref }}
          token: ${{ secrets.KREW_BOT_TOKEN }}
          path: workflow

      - name: Checkout candidate
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          repository: ${{ inputs.target_repo }}
          ref: ${{ inputs.head_sha }}
          path: target

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"

      - name: Install review dependencies
        run: python -m pip install openai pyyaml

      - name: Run review skill
        working-directory: workflow
        run: >-
          python scripts/hf_agent/run_skill_review.py
          --skill "${{ matrix.skill }}"
          --file "${{ inputs.file_path }}"
          --target-root ../target
          --report "${{ runner.temp }}/${{ matrix.skill }}.md"
          --result-json "${{ runner.temp }}/${{ matrix.skill }}.json"

  verifier:
    name: HF Agent / Independent Verifier
    needs: review
    permissions:
      contents: read
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-5-nano
      SEO_OPENAI_REQUIRED: "1"
    steps:
      - name: Checkout workflow tools
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          repository: Hugging-Face-KREW/hf-workflow
          ref: ${{ inputs.workflow_ref }}
          token: ${{ secrets.KREW_BOT_TOKEN }}
          path: workflow

      - name: Checkout exact candidate
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          repository: ${{ inputs.target_repo }}
          ref: ${{ inputs.head_sha }}
          path: target

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"

      - name: Install review dependencies
        run: python -m pip install openai pyyaml

      - name: Verify candidate independently
        working-directory: workflow
        run: |
          for skill in seo quality; do
            python scripts/hf_agent/run_skill_review.py \
              --skill "$skill" \
              --file "${{ inputs.file_path }}" \
              --target-root ../target \
              --report "${{ runner.temp }}/verify-$skill.md" \
              --result-json "${{ runner.temp }}/verify-$skill.json"
          done

  report:
    name: HF Agent / Publish Report
    if: ${{ always() }}
    needs: [review, verifier]
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-5-nano
      SEO_OPENAI_REQUIRED: "1"
    steps:
      - name: Checkout workflow tools
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          repository: Hugging-Face-KREW/hf-workflow
          ref: ${{ inputs.workflow_ref }}
          token: ${{ secrets.KREW_BOT_TOKEN }}
          path: workflow

      - name: Checkout exact candidate
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          repository: ${{ inputs.target_repo }}
          ref: ${{ inputs.head_sha }}
          path: target

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"

      - name: Install report dependencies
        run: python -m pip install openai pyyaml

      - name: Generate comment reports
        working-directory: workflow
        run: |
          mkdir -p ../results
          set +e
          for skill in seo quality; do
            python scripts/hf_agent/run_skill_review.py \
              --skill "$skill" \
              --file "${{ inputs.file_path }}" \
              --target-root ../target \
              --report "../results/$skill.md" \
              --result-json "../results/$skill.json"
          done
          exit 0

      - name: Publish marker report
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PYTHONPATH: workflow/scripts
        run: >-
          python -m hf_agent.publish_pr_comment
          --results results
          --repository "${{ inputs.target_repo }}"
          --pr-number "${{ inputs.pr_number }}"
          --head-sha "${{ inputs.head_sha }}"

  review_threads:
    name: HF Agent / Review Threads
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    outputs:
      count: ${{ steps.threads.outputs.count }}
    steps:
      - name: Checkout workflow tools
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          repository: Hugging-Face-KREW/hf-workflow
          ref: ${{ inputs.workflow_ref }}
          token: ${{ secrets.KREW_BOT_TOKEN }}
          path: workflow

      - name: Count unresolved review threads
        id: threads
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PYTHONPATH: workflow/scripts
        run: |
          python -m hf_agent.review_threads \
            --repository "${{ inputs.target_repo }}" \
            --pr-number "${{ inputs.pr_number }}" \
            --result-json "${{ runner.temp }}/threads.json"
          count=$(jq -r .unresolved_threads "${{ runner.temp }}/threads.json")
          echo "count=$count" >> "$GITHUB_OUTPUT"
          test "$count" -eq 0

  repair:
    name: HF Agent / Repair Failed Gates
    if: ${{ always() && needs.review.result == 'failure' }}
    needs: [review, verifier, report]
    permissions:
      actions: read
      contents: read
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.KREW_BOT_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-5-nano
      SEO_OPENAI_REQUIRED: "1"
      PYTHONPATH: workflow/scripts
    steps:
      - name: Require mutation secrets
        run: |
          test -n "$GITHUB_TOKEN"
          test -n "$OPENAI_API_KEY"

      - name: Checkout workflow tools
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          repository: Hugging-Face-KREW/hf-workflow
          ref: ${{ inputs.workflow_ref }}
          token: ${{ secrets.KREW_BOT_TOKEN }}
          path: workflow

      - name: Checkout failed candidate
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          repository: ${{ inputs.target_repo }}
          ref: ${{ inputs.head_sha }}
          token: ${{ secrets.KREW_BOT_TOKEN }}
          path: target

      - name: Install gate report dependencies
        run: python -m pip install openai pyyaml

      - name: Generate failed gate reports
        working-directory: workflow
        run: |
          mkdir -p ../results
          set +e
          for skill in seo quality; do
            python scripts/hf_agent/run_skill_review.py \
              --skill "$skill" \
              --file "${{ inputs.file_path }}" \
              --target-root ../target \
              --report "../results/$skill.md" \
              --result-json "../results/$skill.json"
          done
          exit 0

      - name: Prepare bounded repair
        id: prepare
        run: |
          python -m hf_agent.repair_gates \
            --results results \
            --repository "${{ inputs.target_repo }}" \
            --pr-number "${{ inputs.pr_number }}" \
            --max-attempts "${{ inputs.max_repair_attempts }}" \
            --feedback-file "${{ runner.temp }}/gate-feedback.txt" \
            --result-json "${{ runner.temp }}/repair.json"
          echo "allowed=$(jq -r .allowed "${{ runner.temp }}/repair.json")" >> "$GITHUB_OUTPUT"

      - name: Stop exhausted autopilot
        if: steps.prepare.outputs.allowed != 'true'
        run: |
          gh pr edit "${{ inputs.pr_number }}" --repo "${{ inputs.target_repo }}" \
            --add-label "hf-agent:needs-human"
          exit 1

      - name: Install repair dependencies
        if: steps.prepare.outputs.allowed == 'true'
        run: python -m pip install openai

      - name: Apply failed gate reports
        id: apply
        if: steps.prepare.outputs.allowed == 'true'
        run: |
          feedback=$(<"${{ runner.temp }}/gate-feedback.txt")
          python -m hf_agent.handle_pr_feedback \
            --target-root target \
            --file "${{ inputs.file_path }}" \
            --feedback "$feedback" \
            --result-json "${{ runner.temp }}/repair-result.json"
          echo "changed=$(jq -r .changed "${{ runner.temp }}/repair-result.json")" >> "$GITHUB_OUTPUT"
          echo "disposition=$(jq -r .disposition "${{ runner.temp }}/repair-result.json")" >> "$GITHUB_OUTPUT"

      - name: Stop non-actionable repair
        if: ${{ steps.prepare.outputs.allowed == 'true' && steps.apply.outputs.changed != 'true' }}
        run: |
          gh pr edit "${{ inputs.pr_number }}" --repo "${{ inputs.target_repo }}" \
            --add-label "hf-agent:needs-human"
          exit 1

      - name: Verify repaired content
        id: verify
        if: steps.apply.outputs.changed == 'true'
        working-directory: workflow
        run: |
          for skill in seo quality; do
            python scripts/hf_agent/run_skill_review.py \
              --skill "$skill" \
              --file "${{ inputs.file_path }}" \
              --target-root ../target \
              --report "${{ runner.temp }}/repair-$skill.md" \
              --result-json "${{ runner.temp }}/repair-$skill.json"
          done

      - name: Stop rejected repair
        if: ${{ always() && steps.verify.outcome == 'failure' }}
        run: |
          gh pr edit "${{ inputs.pr_number }}" --repo "${{ inputs.target_repo }}" \
            --add-label "hf-agent:needs-human"
          exit 1

      - name: Push repaired candidate
        if: steps.apply.outputs.changed == 'true'
        working-directory: target
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -- "${{ inputs.file_path }}"
          git commit -m "🐛 Repair failed PR gates"
          git push origin "HEAD:${{ inputs.branch }}"

  finalize:
    name: HF Agent / Finalize Lifecycle
    if: ${{ always() }}
    needs: [review, verifier, report, review_threads, repair]
    permissions:
      contents: read
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workflow tools
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          repository: Hugging-Face-KREW/hf-workflow
          ref: ${{ inputs.workflow_ref }}
          token: ${{ secrets.KREW_BOT_TOKEN }}
          path: workflow

      - name: Build reviewed snapshot
        run: >-
          jq -n
          --arg head_sha "${{ inputs.head_sha }}"
          --arg feedback_revision "${{ inputs.feedback_revision }}"
          --arg expected_head_sha "${{ inputs.head_sha }}"
          --arg expected_feedback_revision "${{ inputs.feedback_revision }}"
          --argjson gates_passed "${{ needs.review.result == 'success' }}"
          --argjson verifier_passed "${{ needs.verifier.result == 'success' }}"
          --argjson report_published "${{ needs.report.result == 'success' }}"
          --argjson unresolved_threads "${{ needs.review_threads.outputs.count || '1' }}"
          '{head_sha: $head_sha, feedback_revision: $feedback_revision,
          expected_head_sha: $expected_head_sha,
          expected_feedback_revision: $expected_feedback_revision,
          gates_passed: $gates_passed, verifier_passed: $verifier_passed,
          report_published: $report_published, unresolved_threads: $unresolved_threads}'
          > "${{ runner.temp }}/snapshot.json"

      - name: Publish lifecycle status
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PYTHONPATH: workflow/scripts
        run: >-
          python -m hf_agent.finalize_pr
          --snapshot "${{ runner.temp }}/snapshot.json"
          --repository "${{ inputs.target_repo }}"
          --pr-number "${{ inputs.pr_number }}"
          --target-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  notify_ready:
    name: HF Agent / Request Human Merge
    needs: finalize
    permissions:
      contents: read
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    steps:
      - name: Checkout workflow tools
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          repository: Hugging-Face-KREW/hf-workflow
          ref: ${{ inputs.workflow_ref }}
          token: ${{ secrets.KREW_BOT_TOKEN }}
          path: workflow

      - name: Request human merge approval
        if: ${{ env.DISCORD_WEBHOOK_URL != '' }}
        run: >-
          python workflow/scripts/notify_discord.py
          --ready-pr-url "${{ github.server_url }}/${{ inputs.target_repo }}/pull/${{ inputs.pr_number }}"
          --head-sha "${{ inputs.head_sha }}"
