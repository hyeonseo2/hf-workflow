name: Daily HF Blog Translation

on:
  schedule:
    - cron: "10 0 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Target date in Asia/Seoul, YYYY-MM-DD. Empty means today."
        required: false
        type: string
      post_url:
        description: "Optional single Hugging Face Blog URL."
        required: false
        type: string
      dry_run:
        description: "Find posts without creating translation PRs."
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  translate-and-review:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-5-nano
      SEO_OPENAI_REQUIRED: "1"
      BOT_TOKEN: ${{ secrets.KREW_BOT_TOKEN }}
      GH_TOKEN: ${{ secrets.KREW_BOT_TOKEN }}
      KREW_REPO: Hugging-Face-KREW/hugging-face-krew.github.io
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

    steps:
      - name: Checkout hf workflow
        uses: actions/checkout@v4

      - name: Set target date
        id: date
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            echo "value=${{ inputs.date }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(TZ=Asia/Seoul date -d 'yesterday' +%F)" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install translation-flow dependencies
        run: python -m pip install -e "translation-flow[dev]"

      - name: Clone target KREW blog repo
        run: |
          if [ -z "${BOT_TOKEN}" ]; then
            echo "KREW_BOT_TOKEN secret is missing or empty."
            exit 1
          fi
          git clone "https://x-access-token:${BOT_TOKEN}@github.com/${KREW_REPO}.git" target-repo
          git -C target-repo config user.email "github-actions[bot]@users.noreply.github.com"
          git -C target-repo config user.name "github-actions[bot]"

      - name: Ensure HF agent labels exist
        run: |
          gh label create "hf-agent:managed" \
            --repo "${KREW_REPO}" \
            --description "Opt PR into HF Agent review automation" \
            --color "0E8A16" \
            --force
          gh label create "hf-agent:paused" \
            --repo "${KREW_REPO}" \
            --description "Pause HF Agent mutations for this PR" \
            --color "B60205" \
            --force
          gh label create "hf-agent:needs-human" \
            --repo "${KREW_REPO}" \
            --description "HF Agent needs human follow-up" \
            --color "D93F0B" \
            --force

      - name: Create translation PR
        working-directory: translation-flow
        run: |
          args=(
            --date "${{ steps.date.outputs.value }}"
            --timezone "Asia/Seoul"
            --target-worktree "../target-repo"
            --target-repo "${KREW_REPO}"
            --translator "openai"
            --skip-existing
            --allow-untracked
            --run-summary "../run-summary.json"
          )
          if [ -n "${{ inputs.post_url }}" ]; then
            args+=(--post-url "${{ inputs.post_url }}")
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            args+=(--dry-run --no-pr --no-push)
          fi
          python scripts/create_translation_pr.py "${args[@]}"

      - name: Notify Discord about translation PR
        if: ${{ inputs.dry_run != true && env.DISCORD_WEBHOOK_URL != '' }}
        run: python scripts/notify_discord.py --summary run-summary.json

      - name: Generate SEO and quality reports
        if: ${{ inputs.dry_run != true }}
        run: |
          python - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          def resolve_manifest_path(raw_path):
              manifest = Path(raw_path)
              candidates = [manifest]
              if not manifest.is_absolute():
                  candidates.append(Path("translation-flow") / manifest)
              for candidate in candidates:
                  if candidate.exists():
                      return candidate
              tried = ", ".join(str(candidate) for candidate in candidates)
              raise FileNotFoundError(f"Manifest file not found. Tried: {tried}")

          summary_path = Path("run-summary.json")
          if not summary_path.exists():
              print("No run summary found; skipping reports.")
              raise SystemExit(0)

          summary = json.loads(summary_path.read_text())
          for result in summary["results"]:
              if result["status"] != "created":
                  continue
              manifest = resolve_manifest_path(result["manifest_path"])
              subprocess.run(
                  [
                      "python",
                      "scripts/run_local_review.py",
                      "--manifest",
                      str(manifest),
                      "--target-root",
                      "target-repo",
                  ],
                  check=True,
              )
          PY

      - name: Commit manifests and reports
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add reports
          if git diff --cached --quiet; then
            echo "No manifest or report changes to commit."
          else
            git commit -m "Add HF blog workflow reports for ${{ steps.date.outputs.value }}"
            git push
          fi

      - name: Upload run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hf-workflow-${{ steps.date.outputs.value }}
          path: |
            run-summary.json
            reports/**
